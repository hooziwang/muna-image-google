name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          install-only: true

      - name: Build single target via GoReleaser
        run: goreleaser build --snapshot --clean --single-target

      - name: Smoke test binary
        shell: bash
        run: |
          set -euo pipefail

          bin="$(find dist -type f \( -name 'muna-image-google' -o -name 'muna-image-google.exe' \) | head -n 1)"
          if [ -z "${bin}" ]; then
            echo "binary not found in dist/"
            find dist -maxdepth 3 -type f -print || true
            exit 1
          fi

          "${bin}" --help >/dev/null
          "${bin}" key --help >/dev/null
          "${bin}" model --help >/dev/null

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          install-only: true

      - name: Build release notes from tag annotation
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          notes_path="${RUNNER_TEMP}/release-notes.md"
          ref="refs/tags/${TAG}"

          git fetch --force origin "${ref}:${ref}"
          git for-each-ref --format='%(contents)' "${ref}" > "${notes_path}"

          if [ -z "$(tr -d '[:space:]' < "${notes_path}")" ]; then
            echo "${TAG}" > "${notes_path}"
          fi

          echo "RELEASE_NOTES_PATH=${notes_path}" >> "$GITHUB_ENV"

      - name: Release via GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
        run: goreleaser release --clean --release-notes "${RELEASE_NOTES_PATH}"
